# Server port
server.port=8080

# --- GEMINI API SETTINGS ---
# Prefer environment variable GEMINI_API_KEY; falls back to current default.
gemini.api.key=${GEMINI_API_KEY:AIzaSyAbfKDTUQb2skB2Fr-GLsbBWWCuVnIx1Wc}

# Gemini API URL - Using gemini-2.0-flash (latest stable model)
gemini.api.url=https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent

# --- CORS ---  
# Allowed origins for the React frontend
# (Include both common ports for Vite and create-react-app)
cors.allowed-origins=http://localhost:3000,http://localhost:5173,http://localhost:5174

# --- MYSQL DATABASE CONFIGURATION ---
# Allow overriding via environment variables while keeping current defaults working locally.
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/citysafari_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:dad&mom}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# --- HIKARI CONNECTION POOL ---
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# --- JPA/HIBERNATE CONFIGURATION ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true

# --- LOGGING ---
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
